version: '3.8'

services:
  zookeeper:
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_ENABLE_AUTH=no

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - mongodb_data:/data/db

  inventory-service:
    build: ./inventory-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@mongodb:27017/inventory?authSource=admin
    depends_on:
      - kafka
      - mongodb

  order-service:
    build: ./order-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@mongodb:27017/order?authSource=admin
    depends_on:
      - kafka
      - mongodb

  picking-service:
    build: ./picking-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@mongodb:27017/picking?authSource=admin
    depends_on:
      - kafka
      - mongodb

  shipping-service:
    build: ./shipping-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@mongodb:27017/shipping?authSource=admin
    depends_on:
      - kafka
      - mongodb

  inbound-service:
    build: ./inbound-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
      - mongodb

  dispatch-service:
    build: ./dispatch-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - KAFKA_BROKER=kafka:9092
      - SHIPPING_SERVICE_URL=http://shipping-service:3004/shipping
    depends_on:
      - kafka

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - inbound-service
      - inventory-service
      - order-service
      - picking-service
      - shipping-service

volumes:
  mongodb_data:
