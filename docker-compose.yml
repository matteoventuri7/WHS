services:

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    build:
      context: ./scripts
      dockerfile: Dockerfile.kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092

  kafka-ui:
    container_name: kafka-ui
    build:
      context: ./deploy/observability
      dockerfile: Dockerfile.kafka-ui
    ports:
      - 8090:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'

  openobserve:
    image: openobserve/openobserve:latest
    ports:
      - "5080:5080"
    environment:
      - ZO_DATA_DIR=/data
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=Complexpass#123
    volumes:
      - openobserve_data:/data

  fluent-bit:
    build:
      context: ./deploy/observability
      dockerfile: Dockerfile.fluent-bit
    ports:
      - "24224:24224"
    depends_on:
      openobserve:
        condition: service_started

  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    volumes:
      - ./deploy/observability/vector.yaml:/etc/vector/vector.yaml:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      openobserve:
        condition: service_started

  inventory-db:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - inventory_mongodb_data:/data/db

  order-db:
    image: mongo:latest
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - order_mongodb_data:/data/db

  picking-db:
    image: mongo:latest
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - picking_mongodb_data:/data/db

  shipping-db:
    image: mongo:latest
    ports:
      - "27020:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - shipping_mongodb_data:/data/db

  inventory-service:
    build: ./inventory-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@inventory-db:27017/inventory?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      inventory-db:
        condition: service_started
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        fluentd-sub-second-precision: "true"
        tag: "whs.inventory-service"

  order-service:
    build: ./order-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@order-db:27017/order?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      order-db:
        condition: service_started
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        fluentd-sub-second-precision: "true"
        tag: "whs.order-service"

  picking-service:
    build: ./picking-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@picking-db:27017/picking?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      picking-db:
        condition: service_started
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        fluentd-sub-second-precision: "true"
        tag: "whs.picking-service"

  shipping-service:
    build: ./shipping-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@shipping-db:27017/shipping?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      shipping-db:
        condition: service_started
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        fluentd-retry-wait: "1s"
        fluentd-max-retries: "30"
        fluentd-sub-second-precision: "true"
        tag: "whs.shipping-service"

  inventory-simulator-service:
    build: ./simulators/inventory-simulator-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - INVENTORY_SERVICE_URL=http://inventory-service:3001/inventory
    depends_on:
      inventory-service:
        condition: service_started

  shipping-simulator-service:
    build: ./simulators/shipping-simulator-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - SHIPPING_SERVICE_URL=http://shipping-service:3004/shipping
    depends_on:
      shipping-service:
        condition: service_started

  order-simulator-service:
    build: ./simulators/order-simulator-service
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - INVENTORY_SERVICE_URL=http://inventory-service:3001/inventory
      - ORDER_SERVICE_URL=http://order-service:3002/orders
    depends_on:
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started

  picking-simulator-service:
    build: ./simulators/picking-simulator-service
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - PICKING_SERVICE_URL=http://picking-service:3003/picking
    depends_on:
      picking-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - INVENTORY_SERVICE_URL=http://inventory-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
      - PICKING_SERVICE_URL=http://picking-service:3003
      - SHIPPING_SERVICE_URL=http://shipping-service:3004
      - INBOUND_SIMULATOR_URL=http://inventory-simulator-service:3005
      - DISPATCH_SIMULATOR_URL=http://shipping-simulator-service:3006
      - ORDER_SIMULATOR_URL=http://order-simulator-service:3007
      - PICKING_SIMULATOR_URL=http://picking-simulator-service:3008
      - KAFKA_BROKER=kafka:9092
      - OPENOBSERVE_URL=http://openobserve:5080
      - KAFKA_UI_URL=http://kafka-ui:8080
      - KAFKA_HOST=kafka
      - KAFKA_PORT=9092
      - FLUENTBIT_HOST=fluent-bit
      - FLUENTBIT_PORT=24224
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      inventory-simulator-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
      picking-service:
        condition: service_started
      shipping-service:
        condition: service_started
      order-simulator-service:
        condition: service_started
      picking-simulator-service:
        condition: service_started

volumes:
  inventory_mongodb_data:
  order_mongodb_data:
  picking_mongodb_data:
  shipping_mongodb_data:

  openobserve_data:
