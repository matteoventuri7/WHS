version: '3.8'

services:
  zookeeper:
    image: zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      - ZOO_MY_ID=1

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/init-kafka-topics.sh:/init-kafka-topics.sh
    environment:
      - KAFKA_BROKER=kafka:9092
    entrypoint: ["/bin/bash", "/init-kafka-topics.sh"]

  inventory-db:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - inventory_mongodb_data:/data/db

  order-db:
    image: mongo:latest
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - order_mongodb_data:/data/db

  picking-db:
    image: mongo:latest
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - picking_mongodb_data:/data/db

  shipping-db:
    image: mongo:latest
    ports:
      - "27020:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - shipping_mongodb_data:/data/db

  inbound-db:
    image: mongo:latest
    ports:
      - "27021:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - inbound_mongodb_data:/data/db

  dispatch-db:
    image: mongo:latest
    ports:
      - "27022:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - dispatch_mongodb_data:/data/db

  inventory-service:
    build: ./inventory-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@inventory-db:27017/inventory?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      inventory-db:
        condition: service_started

  order-service:
    build: ./order-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@order-db:27017/order?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      order-db:
        condition: service_started

  picking-service:
    build: ./picking-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@picking-db:27017/picking?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      picking-db:
        condition: service_started

  shipping-service:
    build: ./shipping-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@shipping-db:27017/shipping?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      shipping-db:
        condition: service_started

  inbound-service:
    build: ./inbound-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@inbound-db:27017/inbound?authSource=admin
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      inbound-db:
        condition: service_started

  dispatch-service:
    build: ./dispatch-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@dispatch-db:27017/dispatch?authSource=admin
      - SHIPPING_SERVICE_URL=http://shipping-service:3004/shipping
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      dispatch-db:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - inbound-service
      - inventory-service
      - order-service
      - picking-service
      - shipping-service

volumes:
  inventory_mongodb_data:
  order_mongodb_data:
  picking_mongodb_data:
  shipping_mongodb_data:
  inbound_mongodb_data:
  dispatch_mongodb_data:
