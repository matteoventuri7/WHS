version: '3.8'

services:
  zookeeper:
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_ENABLE_AUTH=no

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper

  inventory-db:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - inventory_mongodb_data:/data/db

  order-db:
    image: mongo:latest
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - order_mongodb_data:/data/db

  picking-db:
    image: mongo:latest
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - picking_mongodb_data:/data/db

  shipping-db:
    image: mongo:latest
    ports:
      - "27020:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - shipping_mongodb_data:/data/db

  inbound-db:
    image: mongo:latest
    ports:
      - "27021:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - inbound_mongodb_data:/data/db

  dispatch-db:
    image: mongo:latest
    ports:
      - "27022:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - dispatch_mongodb_data:/data/db

  inventory-service:
    build: ./inventory-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@inventory-db:27017/inventory?authSource=admin
    depends_on:
      - kafka
      - inventory-db

  order-service:
    build: ./order-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@order-db:27017/order?authSource=admin
    depends_on:
      - kafka
      - order-db

  picking-service:
    build: ./picking-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@picking-db:27017/picking?authSource=admin
    depends_on:
      - kafka
      - picking-db

  shipping-service:
    build: ./shipping-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@shipping-db:27017/shipping?authSource=admin
    depends_on:
      - kafka
      - shipping-db

  inbound-service:
    build: ./inbound-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@inbound-db:27017/inbound?authSource=admin
    depends_on:
      - kafka
      - inbound-db

  dispatch-service:
    build: ./dispatch-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - KAFKA_BROKER=kafka:9092
      - MONGODB_URI=mongodb://root:example@dispatch-db:27017/dispatch?authSource=admin
      - SHIPPING_SERVICE_URL=http://shipping-service:3004/shipping
    depends_on:
      - kafka
      - dispatch-db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - inbound-service
      - inventory-service
      - order-service
      - picking-service
      - shipping-service

volumes:
  inventory_mongodb_data:
  order_mongodb_data:
  picking_mongodb_data:
  shipping_mongodb_data:
  inbound_mongodb_data:
  dispatch_mongodb_data:
