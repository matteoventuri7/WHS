name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  run-tests:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: inventory-service
            path: inventory-service
          - service: order-service
            path: order-service
          - service: picking-service
            path: picking-service
          - service: shipping-service
            path: shipping-service
          - service: inventory-simulator-service
            path: simulators/inventory-simulator-service
          - service: shipping-simulator-service
            path: simulators/shipping-simulator-service
          - service: order-simulator-service
            path: simulators/order-simulator-service
          - service: picking-simulator-service
            path: simulators/picking-simulator-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.path }}
        run: npm ci

      - name: Run unit tests
        working-directory: ./${{ matrix.path }}
        run: npm test

  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: inventory-service
            path: inventory-service
          - service: order-service
            path: order-service
          - service: picking-service
            path: picking-service
          - service: shipping-service
            path: shipping-service
          - service: inventory-simulator-service
            path: simulators/inventory-simulator-service
          - service: shipping-simulator-service
            path: simulators/shipping-simulator-service
          - service: order-simulator-service
            path: simulators/order-simulator-service
          - service: picking-simulator-service
            path: simulators/picking-simulator-service
          - service: frontend
            path: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.path }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
